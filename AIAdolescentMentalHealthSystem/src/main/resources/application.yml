server:
  tomcat:
    max-swallow-size: 2MB
  port: 8080

spring:
  application:
    name: AIAdolescentMentalHealthSystem
  profiles:
    active: test
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  web:
    resources:
      add-mappings: false
  #  mysql
  datasource:
    url: jdbc:mysql://${db.mysql.host:localhost}:${db.mysql.port:3306}/xinyuzhilian?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${db.mysql.username:root}
    password: ${db.mysql.pw:123456}
#redis
  data:
    redis:
      host: ${db.redis.host:localhost}
      port: 6379

  websocket:
    max-text-message-buffer-size: 5242880 # 5MB
    max-binary-message-buffer-size: 5242880

mybatis-plus:
  mapper-locations: "classpath*:/mapper/**/*.xml"


# 日志配置
logging:
  level:
    com:
      xinyuzhilian:
        aiadolescentmentalhealthsystem: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n%wEx"

# OSS配置
aliyun:
  oss:
    endpoint: ${oss.endpoint:oss-cn-beijing.aliyuncs.com}
    accessKeyId: ${oss.keyid:REPLACE_ME_OSS_ACCESS_KEY_ID}
    accessKeySecret: ${oss.keysecret:REPLACE_ME_OSS_ACCESS_KEY_SECRET}
    bucketName: ${oss.bucketname:xinyuzhilian-aiadolescentmentalhealthsystem}

jwt:
  secret: ${JWT_SECRET:CHANGE_ME_TO_A_LONG_RANDOM_SECRET}  # 密钥（HS256需至少256位）
  expiration: 86400000  # 过期时间（毫秒，这里是24小时）
  issuer: "AIAdolescentMentalHealthSystem"
  rememberExpiration: 2592000000

# DashScope API 配置（用于AI对话功能）
dashscope:
  api:
    key: ${DASHSCOPE_API_KEY:REPLACE_ME_DASHSCOPE_API_KEY}

wx:
  appid: wxb5c3ee45467ef38a
  secret: ${WX_APP_SECRET:REPLACE_ME_WX_APP_SECRET}

# 微信公众号配置
wx-gzh:
  appid: wx1cdbf73ddc785370
  secret: ${WX_GZH_SECRET:REPLACE_ME_WX_GZH_SECRET}
  # 授权回调地址（本地测试用 ngrok 穿透，格式：https://xxx.ngrok.io）
  # 生产环境填你的公网域名，如：https://api.yourdomain.com
  callback-base-url: "https://122.51.12.200"

# 发送邮件配置
send:
  mail:
    host: smtp.qq.com
    port: 587
    username: 771038325@qq.com
    password: ${MAIL_PASSWORD:REPLACE_ME_MAIL_PASSWORD}

