name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  IMAGE_TAG: ${{ github.sha }}
  BACKEND_IMAGE: ghcr.io/a-words/ai-adolescent-mental-health-backend
  WEB_CLIENT_IMAGE: ghcr.io/a-words/ai-adolescent-mental-health-web-client
  ADMIN_PORTAL_IMAGE: ghcr.io/a-words/ai-adolescent-mental-health-admin-portal

jobs:
  deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest
    environment: production
    env:
      BACKEND_URL: ${{ vars.BACKEND_URL }}
      NEXT_PUBLIC_WS_BASE_URL: ${{ vars.NEXT_PUBLIC_WS_BASE_URL }}
      SPRING_PROFILES_ACTIVE: ${{ vars.SPRING_PROFILES_ACTIVE }}
      JAVA_OPTS: ${{ vars.JAVA_OPTS }}
      BACKEND_PORT: ${{ vars.BACKEND_PORT }}
      WEB_CLIENT_PORT: ${{ vars.WEB_CLIENT_PORT }}
      ADMIN_PORTAL_PORT: ${{ vars.ADMIN_PORTAL_PORT }}
      DB_MYSQL_HOST: ${{ vars.DB_MYSQL_HOST }}
      DB_MYSQL_PORT: ${{ vars.DB_MYSQL_PORT }}
      DB_MYSQL_DATABASE: ${{ vars.DB_MYSQL_DATABASE }}
      DB_MYSQL_USERNAME: ${{ secrets.DB_MYSQL_USERNAME || vars.DB_MYSQL_USERNAME }}
      DB_MYSQL_PASSWORD: ${{ secrets.DB_MYSQL_PASSWORD }}
      DB_REDIS_HOST: ${{ vars.DB_REDIS_HOST }}
      DB_REDIS_PORT: ${{ vars.DB_REDIS_PORT }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      WX_APP_ID: ${{ secrets.WX_APP_ID || vars.WX_APP_ID }}
      WX_APP_SECRET: ${{ secrets.WX_APP_SECRET }}
      WX_GZH_APP_ID: ${{ secrets.WX_GZH_APP_ID || vars.WX_GZH_APP_ID }}
      WX_GZH_SECRET: ${{ secrets.WX_GZH_SECRET }}
      WX_GZH_CALLBACK_BASE_URL: ${{ vars.WX_GZH_CALLBACK_BASE_URL }}
      ALIYUN_OSS_ENDPOINT: ${{ vars.ALIYUN_OSS_ENDPOINT }}
      ALIYUN_OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
      ALIYUN_OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
      ALIYUN_OSS_BUCKET_NAME: ${{ vars.ALIYUN_OSS_BUCKET_NAME }}
      MAIL_HOST: ${{ vars.MAIL_HOST }}
      MAIL_PORT: ${{ vars.MAIL_PORT }}
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME || vars.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate production config
        run: |
          set -euo pipefail

          : "${BACKEND_URL:?Missing production environment variable BACKEND_URL}"
          : "${NEXT_PUBLIC_WS_BASE_URL:?Missing production environment variable NEXT_PUBLIC_WS_BASE_URL}"
          : "${DB_MYSQL_HOST:?Missing production environment variable DB_MYSQL_HOST}"
          : "${DB_MYSQL_USERNAME:?Missing production environment secret or variable DB_MYSQL_USERNAME}"
          : "${DB_MYSQL_PASSWORD:?Missing production environment secret DB_MYSQL_PASSWORD}"
          : "${DB_REDIS_HOST:?Missing production environment variable DB_REDIS_HOST}"
          : "${JWT_SECRET:?Missing production environment secret JWT_SECRET}"
          : "${DASHSCOPE_API_KEY:?Missing production environment secret DASHSCOPE_API_KEY}"
          : "${WX_APP_ID:?Missing production environment secret or variable WX_APP_ID}"
          : "${WX_APP_SECRET:?Missing production environment secret WX_APP_SECRET}"
          : "${WX_GZH_APP_ID:?Missing production environment secret or variable WX_GZH_APP_ID}"
          : "${WX_GZH_SECRET:?Missing production environment secret WX_GZH_SECRET}"
          : "${ALIYUN_OSS_ENDPOINT:?Missing production environment variable ALIYUN_OSS_ENDPOINT}"
          : "${ALIYUN_OSS_ACCESS_KEY_ID:?Missing production environment secret ALIYUN_OSS_ACCESS_KEY_ID}"
          : "${ALIYUN_OSS_ACCESS_KEY_SECRET:?Missing production environment secret ALIYUN_OSS_ACCESS_KEY_SECRET}"
          : "${ALIYUN_OSS_BUCKET_NAME:?Missing production environment variable ALIYUN_OSS_BUCKET_NAME}"
          : "${MAIL_HOST:?Missing production environment variable MAIL_HOST}"
          : "${MAIL_PORT:?Missing production environment variable MAIL_PORT}"
          : "${MAIL_USERNAME:?Missing production environment secret or variable MAIL_USERNAME}"
          : "${MAIL_PASSWORD:?Missing production environment secret MAIL_PASSWORD}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build and push web-client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web-client/Dockerfile
          push: true
          tags: ${{ env.WEB_CLIENT_IMAGE }}:${{ env.IMAGE_TAG }}
          build-args: |
            BACKEND_URL=${{ env.BACKEND_URL }}
            NEXT_PUBLIC_WS_BASE_URL=${{ env.NEXT_PUBLIC_WS_BASE_URL }}
          cache-from: type=gha,scope=web-client
          cache-to: type=gha,scope=web-client,mode=max

      - name: Build and push admin-portal image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin-portal/Dockerfile
          push: true
          tags: ${{ env.ADMIN_PORTAL_IMAGE }}:${{ env.IMAGE_TAG }}
          build-args: |
            BACKEND_URL=${{ env.BACKEND_URL }}
          cache-from: type=gha,scope=admin-portal
          cache-to: type=gha,scope=admin-portal,mode=max

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail

          : "${DEPLOY_HOST:?Missing DEPLOY_HOST secret}"
          : "${DEPLOY_SSH_KEY:?Missing DEPLOY_SSH_KEY secret}"
          : "${DEPLOY_USER:?Missing DEPLOY_USER secret}"

          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          GHCR_TOKEN: ${{ github.token }}
          GHCR_USERNAME: ${{ github.actor }}
        run: |
          set -euo pipefail

          : "${DEPLOY_HOST:?Missing DEPLOY_HOST secret}"
          : "${DEPLOY_PATH:?Missing DEPLOY_PATH secret}"
          : "${DEPLOY_USER:?Missing DEPLOY_USER secret}"
          : "${GHCR_TOKEN:?Missing GHCR_TOKEN}"
          : "${GHCR_USERNAME:?Missing GHCR_USERNAME}"

          prod_env_file="$(mktemp)"
          trap 'rm -f "$prod_env_file"' EXIT
          chmod 600 "$prod_env_file"
          python3 - "$prod_env_file" <<'PY'
          import os
          import sys

          keys = [
              "BACKEND_URL",
              "NEXT_PUBLIC_WS_BASE_URL",
              "SPRING_PROFILES_ACTIVE",
              "JAVA_OPTS",
              "BACKEND_PORT",
              "WEB_CLIENT_PORT",
              "ADMIN_PORTAL_PORT",
              "DB_MYSQL_HOST",
              "DB_MYSQL_PORT",
              "DB_MYSQL_DATABASE",
              "DB_MYSQL_USERNAME",
              "DB_MYSQL_PASSWORD",
              "DB_REDIS_HOST",
              "DB_REDIS_PORT",
              "JWT_SECRET",
              "DASHSCOPE_API_KEY",
              "WX_APP_ID",
              "WX_APP_SECRET",
              "WX_GZH_APP_ID",
              "WX_GZH_SECRET",
              "WX_GZH_CALLBACK_BASE_URL",
              "ALIYUN_OSS_ENDPOINT",
              "ALIYUN_OSS_ACCESS_KEY_ID",
              "ALIYUN_OSS_ACCESS_KEY_SECRET",
              "ALIYUN_OSS_BUCKET_NAME",
              "MAIL_HOST",
              "MAIL_PORT",
              "MAIL_USERNAME",
              "MAIL_PASSWORD",
          ]

          with open(sys.argv[1], "w", encoding="utf-8") as env_file:
              for key in keys:
                  value = os.environ.get(key, "")
                  escaped = (
                      value.replace("\\", "\\\\")
                      .replace("\n", "\\n")
                      .replace('"', '\\"')
                      .replace("$", "\\$")
                  )
                  env_file.write(f'{key}="{escaped}"\n')
          PY

          remote_env=$(
            printf 'DEPLOY_PATH=%q IMAGE_TAG=%q BACKEND_IMAGE=%q WEB_CLIENT_IMAGE=%q ADMIN_PORTAL_IMAGE=%q GHCR_USERNAME=%q' \
              "$DEPLOY_PATH" \
              "$IMAGE_TAG" \
              "$BACKEND_IMAGE:$IMAGE_TAG" \
              "$WEB_CLIENT_IMAGE:$IMAGE_TAG" \
              "$ADMIN_PORTAL_IMAGE:$IMAGE_TAG" \
              "$GHCR_USERNAME"
          )

          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" "$remote_env bash -s" <<'REMOTE_PREP'
          set -euo pipefail
          mkdir -p "$DEPLOY_PATH/deploy"
          REMOTE_PREP

          scp -i ~/.ssh/deploy_key -P "${DEPLOY_PORT:-22}" "$prod_env_file" "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.env.production"
          scp -i ~/.ssh/deploy_key -P "${DEPLOY_PORT:-22}" deploy/docker-compose.prod.yml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/deploy/docker-compose.prod.yml"

          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" "$remote_env bash -s" <<REMOTE_SCRIPT
          set -euo pipefail

          printf '%s' '$GHCR_TOKEN' | docker login ghcr.io -u "\$GHCR_USERNAME" --password-stdin
          trap 'docker logout ghcr.io >/dev/null 2>&1 || true' EXIT

          retry() {
            max_attempts="\$1"
            delay_seconds="\$2"
            shift 2

            attempt=1
            until "\$@"; do
              status="\$?"
              if [ "\$attempt" -ge "\$max_attempts" ]; then
                return "\$status"
              fi

              echo "Command failed with exit code \$status. Retrying in \$delay_seconds seconds... (\$attempt/\$max_attempts)" >&2
              sleep "\$delay_seconds"
              attempt="\$((attempt + 1))"
            done
          }

          mkdir -p "\$DEPLOY_PATH"
          cd "\$DEPLOY_PATH"

          chmod 600 .env.production
          export IMAGE_TAG BACKEND_IMAGE WEB_CLIENT_IMAGE ADMIN_PORTAL_IMAGE
          retry 3 10 docker compose --env-file .env.production -f deploy/docker-compose.prod.yml pull
          docker compose --env-file .env.production -f deploy/docker-compose.prod.yml up -d --remove-orphans
          REMOTE_SCRIPT
