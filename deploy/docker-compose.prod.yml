# 生产环境 Docker Compose 配置
# MySQL / Redis / RabbitMQ 由宿主机提供，不在此处部署
# 环境变量通过 .env.production 注入（由 GitHub Actions deploy workflow 生成）

name: aiamh

services:
  # ===== 后端 API 服务 =====
  backend:
    image: ${BACKEND_IMAGE}
    container_name: aiamh-backend
    restart: unless-stopped
    network_mode: host
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      JAVA_OPTS: ${JAVA_OPTS:--Xmx512m}
      DB_MYSQL_HOST: ${DB_MYSQL_HOST:-127.0.0.1}
      DB_MYSQL_PORT: ${DB_MYSQL_PORT:-3306}
      DB_MYSQL_DATABASE: ${DB_MYSQL_DATABASE:-xinyuzhilian}
      DB_MYSQL_USERNAME: ${DB_MYSQL_USERNAME}
      DB_MYSQL_PASSWORD: ${DB_MYSQL_PASSWORD}
      DB_REDIS_HOST: ${DB_REDIS_HOST:-127.0.0.1}
      DB_REDIS_PORT: ${DB_REDIS_PORT:-6379}
      DB_REDIS_PASSWORD: ${DB_REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      WX_APP_ID: ${WX_APP_ID}
      WX_APP_SECRET: ${WX_APP_SECRET}
      WX_GZH_APP_ID: ${WX_GZH_APP_ID}
      WX_GZH_SECRET: ${WX_GZH_SECRET}
      WX_GZH_CALLBACK_BASE_URL: ${WX_GZH_CALLBACK_BASE_URL}
      ALIYUN_OSS_ENDPOINT: ${ALIYUN_OSS_ENDPOINT}
      ALIYUN_OSS_ACCESS_KEY_ID: ${ALIYUN_OSS_ACCESS_KEY_ID}
      ALIYUN_OSS_ACCESS_KEY_SECRET: ${ALIYUN_OSS_ACCESS_KEY_SECRET}
      ALIYUN_OSS_BUCKET_NAME: ${ALIYUN_OSS_BUCKET_NAME}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}

  # ===== Web 用户端 (Next.js) =====
  web-client:
    image: ${WEB_CLIENT_IMAGE}
    container_name: aiamh-web-client
    restart: unless-stopped
    network_mode: host
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://127.0.0.1:8080}
      NEXT_PUBLIC_WS_BASE_URL: ${NEXT_PUBLIC_WS_BASE_URL}

  # ===== Admin 管理端 (Next.js) =====
  admin-portal:
    image: ${ADMIN_PORTAL_IMAGE}
    container_name: aiamh-admin-portal
    restart: unless-stopped
    network_mode: host
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://127.0.0.1:8080}
